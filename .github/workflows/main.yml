name: Build wifi_s3_ethernet
        run: pio run -e wifi_s3_ethernet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build wifi_s3_ethernet
        run: |
          cd FluidNC
          pio run -e wifi_s3_ethernet

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluidnc-w5500-${{ github.sha }}
          path: |
            FluidNC/.pio/build/wifi_s3_ethernet/firmware.bin
            FluidNC/.pio/build/wifi_s3_ethernet/partitions.bin
          retention-days: 30
